{% extends 'base.html' %}
{% block content %}
<h1>Адмін</h1>
<p>Записи на {{ date }} ({{ day_name }})</p>
<nav>
  <a href="{{ url_for('admin', token=token, date=today) }}">Сьогодні</a> |
  <a href="{{ url_for('admin', token=token, date=tomorrow) }}">Завтра</a>
</nav>
<form method="get">
  <input type="hidden" name="token" value="{{ token }}">
  <label>Дата:<input type="date" name="date" value="{{ date }}"><button type="submit">Показати</button></label>
</form>
{% if bookings %}
<ul>
{% for b in bookings %}
  <li>{{ b[4] }} – {{ b[1] }} ({{ b[3] }}, {{ b[2] }})
    <a href="{{ url_for('admin_cancel', booking_id=b[0], token=token, date=date) }}">Скасувати</a>
  </li>
{% endfor %}
</ul>
{% else %}
<p>Немає записів.</p>
{% endif %}
{% endblock %}
